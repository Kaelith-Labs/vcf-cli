description = "Capture a fresh idea into the VCF-MCP ideas workspace. Use when the user says \"capture that idea\", \"capture this idea\", \"save this as an idea\", or explicitly invokes /capture-idea."

prompt = """
# Capture Idea

This skill turns a free-form idea into a persisted, tagged markdown file via the `idea_capture` MCP tool.

## When to use

- User says: *"capture that idea"*, *"capture this idea"*, *"save this as an idea"*
- User explicitly invokes: `/capture-idea`

Do **not** use this skill for:
- Fully-formed specs (use `/spec-idea` later to expand the idea into a spec).
- Short notes on an existing project (those belong in `plans/decisions/` or the project's daily log).

## What to do

1. Identify the idea body from the conversation. If the user's phrasing is vague, ask for one sentence of clarification before capturing.
2. Suggest 2-4 lowercase kebab-case tags based on the content (e.g. `ai`, `cli`, `infra`, `developer-tooling`). Confirm with the user if tags aren't obvious.
3. Call the MCP tool:
   ```
   idea_capture({
     content: "<the idea, as markdown>",
     title: "<short title>",
     tags: ["tag1", "tag2"],
     context: "<source or link, if any>"
   })
   ```
4. Report the returned `paths[0]` and `summary` to the user. Do **not** call with `expand=true` by default — the file on disk is the source of truth.

## Reminders

- This tool writes into the user's configured `workspace.ideas_dir`. You cannot change that location from here.
- The server enforces tag shape. If a tag you suggest doesn't match `^[a-z][a-z0-9-]*$`, drop it.
- On `E_ALREADY_EXISTS` (two captures same day, same slug), the server auto-suffixes — retry is not needed.
"""
