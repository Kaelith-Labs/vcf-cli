name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: ${{ matrix.os }} · node-${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-latest and windows-latest dropped for MVP — npm/cli#4828
        # (cross-platform optional-dep resolution from a Linux-generated
        # lockfile) is the blocker. `npm install` on a clean clone works
        # fine for end users on those platforms; the issue is specific to
        # CI reusing a lockfile. Revisit once npm merges a fix.
        os: [ubuntu-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test
      - name: Smoke-check built bins
        shell: bash
        run: |
          node dist/cli.js version
          # MCP bin requires config; expect clean exit (code 3) on missing config
          # rather than crash. stdin is closed in CI, so the server won't hang.
          node dist/mcp.js --scope global < /dev/null || test $? -eq 3
